<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="w-full max-w-sm px-8 py-8 bg-white rounded shadow-sm">
    <h2 class="text-2xl font-semibold text-gray-900 mb-6">Login</h2>

    <form [formGroup]="form" (ngSubmit)="Submit()">

      <div class="mb-4">
        <label class="block text-sm text-gray-700 mb-1">Email</label>
        <input type="email" formControlName="email" placeholder="e.g., test@test.at"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
        @if(form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="text-red-500 text-xs">Valid email required.</span>
        }
      </div>
      <div class="mb-6">
        <label class="block text-sm text-gray-700 mb-1">Password</label>
        <input type="password" formControlName="password" placeholder="******"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
        @if(form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="text-red-500 text-xs">Min. 8 characters.</span>
        }
      </div>
      <div class="flex gap-3">
        <button type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-5 py-2 rounded">
          Login
        </button>
        <button type="button" (click)="form.reset()"
          class="bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm px-5 py-2 rounded">
          Clear Fields
        </button>
      </div>
    </form>

    <p class="text-sm text-gray-500 mt-4">
      No account? <a href="/register" class="text-blue-600 hover:underline">Register</a>
    </p>
  </div>
</div>
