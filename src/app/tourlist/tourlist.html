<ul class="tour-list">
  @for (tour of vm.tours(); track tour.id) {
    <li>
      <button
        class="tour-button-row"
        type="button"
        (click)="vm.selectTour(tour.id)"
        [class.active]="vm.selectedTourId() === tour.id">
        {{ tour.name }}
      </button>
    </li>
  }
</ul>

@if (vm.selectedTour(); as selectedTour) {
  <div class="selected">
    <h2>{{ selectedTour.name }}</h2>
    <p>{{ selectedTour.details }}</p>
  </div>
}
