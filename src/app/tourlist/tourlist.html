<ul class="tour-list">
  @for (tour of vm.tours(); track tour.id) {
    <li>
      <button
        class="tour-button-row"
        type="button"
        (click)="vm.selectTour(tour.id)"
        [class.active]="vm.selectedTourId() === tour.id">
        {{ tour.name }}
      </button>
    </li>
  }
</ul>

<!-- Task 4 -->
<div class="mt-3 mb-3 px-3 py-2 bg-gray-50 border border-gray-200 rounded text-sm text-gray-600">
  <span>Tours: <strong class="text-gray-900">{{ vm.tourCount() }}</strong></span>
  @if (vm.hasSelection()) {
    <span class="ml-3 text-gray-600 font-medium">{{ vm.positionLabel() }}</span>
  }
</div>

@if (vm.selectedTour(); as selectedTour) {
  <div class="selected">
    <h2>{{ selectedTour.name }}</h2>
    <p>{{ selectedTour.details }}</p>
  </div>
}
