<div class="form-container">
  <div class="field-row">
    <h4>Trip Name</h4>
    <input type="text" placeholder="Enter trip name" class="input-field">
  </div>

  <div class="route-row">
    <div class="field-row">
      <h4>From</h4>
      <input id="from" type="text" class="input-field">
    </div>

    <div class="field-row">
      <h4>To</h4>
      <input id="to" type="text" class="input-field">
    </div>
  </div>

  <div class="field-row">
    <h4>Transportation</h4>
    <div class="transport-buttons">
        <button type="button" class="transport-btn">🚗</button>
        <button type="button" class="transport-btn">🚆</button>
        <button type="button" class="transport-btn">🚌</button>
        <button type="button" class="transport-btn">✈️</button>
        <button type="button" class="transport-btn">🚲</button>
    </div>
  </div>

  <div class="route-row">
    <div class="field-row">
      <h4>Duration</h4>
      <input id="duration" type="text" class="input-field">
    </div>

    <div class="field-row">
      <h4>Distance</h4>
      <input id="distance" type="text" class="input-field">
    </div>
  </div>

  <div class="field-row">
    <h4>Description</h4>
    <textarea placeholder="Enter trip description" class="textarea-field"></textarea>
  </div>

  <div class="route-row">
    <div class="field-row">
      <button class="create-button">Create Tour</button>
    </div>
    <div class="field-row">
      <button class="clear-button">Clear Form</button>
    </div>
  </div>
</div>
